const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryDecrypt(payload, secret){
  const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(secret), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:fromB64(payload.salt), iterations:310000, hash:"SHA-256"},
    keyMat, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:fromB64(payload.iv)}, key, fromB64(payload.data));
  return new TextDecoder().decode(plain);
}
function boot(html){ document.open(); document.write(html); document.close(); }
(async () => {
  const host = location.hostname.toLowerCase();
  for(const p of PAYLOADS){
    try{ boot(await tryDecrypt(p, host)); return; }catch(e){}
  }
  document.getElementById("msg").textContent =
    "Den här kopian av appen är låst till sin ursprungliga webbadress och kan inte köras här.";
})();
