name: Tester

on:
  push:
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    # Här sätter vi basmappen för alla kommandon i hela jobbet
    defaults:
      run:
        working-directory: github

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installera beroenden
        run: npm install

      - name: Installera Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Kör testerna
        run: npx playwright test

      - name: Ladda upp testrapport vid fel
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: github/playwright-report/
          retention-days: 14
